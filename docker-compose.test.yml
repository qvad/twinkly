services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./test/sql/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    tmpfs:
      - /var/lib/postgresql/data

  yugabytedb:
    image: yugabytedb/yugabyte:latest
    command: |
      bash -c "
      (sleep 15 && /home/yugabyte/bin/ysqlsh -h localhost -p 5433 -U yugabyte -d yugabyte -f /tmp/init.sql) &
      rm -f /tmp/yb_data/yugabyted.pid &&
      /home/yugabyte/bin/yugabyted start --daemon=false --base_dir=/tmp/yb_data --listen=0.0.0.0 --tserver_flags="pgsql_proxy_bind_address=0.0.0.0:5433"
      "
    ports:
      - "5433:5433"
    healthcheck:
      test: ["CMD-SHELL", "/home/yugabyte/bin/ysqlsh -h localhost -p 5433 -U yugabyte -d yugabyte -c 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./test/sql/init-yugabyte.sql:/tmp/init.sql
      - yb_data_volume:/tmp/yb_data

  twinkly-tests:
    build:
      context: .
      dockerfile: test/Dockerfile.integration
    depends_on:
      postgres:
        condition: service_healthy
      yugabytedb:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
      YUGABYTE_HOST: yugabytedb
      YUGABYTE_PORT: 5433
      YUGABYTE_USER: yugabyte
      YUGABYTE_DB: yugabyte
    volumes:
      - .:/app
    working_dir: /app
    command: ["go", "test", "-v", "./test/integration/..."]

volumes:
  yb_data_volume: